<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary WebSocket | Mode Temps Réel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>
    
    <main class="container">
        <header class="header">
            <h1 class="logo">Visionary<span>.LIVE</span></h1>
            <p class="subtitle">Suivi de génération ultra-précis par WebSocket</p>
        </header>

        <div class="glass-panel">
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="prompt-input" placeholder="Décrivez votre vision..." autocomplete="off">
                </div>
                <button id="generate-btn" class="primary-btn">
                    <span class="btn-text">Démarrer la Session</span>
                    <span class="loader hidden"></span>
                </button>
            </div>

            <!-- Grille de résultats -->
            <div class="result-grid" id="result-grid">
                <!-- Les cartes seront injectées via JS (initPlaceholders) -->
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
